version: '3'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    command: >
      --config /nakama/data/local.yml
      --database.address postgres:5432
    volumes:
      - ./local.yml:/nakama/data/local.yml